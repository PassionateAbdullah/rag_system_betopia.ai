services:
  ollama:
    image: ollama/ollama:latest
    container_name: betopia-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # One-shot init that pulls the small Qwen model once Ollama is healthy.
  # Idempotent — `ollama pull` no-ops when the layer cache is up to date.
  ollama-init:
    image: ollama/ollama:latest
    container_name: betopia-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "ollama pull qwen2.5:0.5b && echo 'qwen2.5:0.5b ready'"
    restart: "no"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: betopia-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  ollama_data:
  qdrant_data:
